name: Remove Reject
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  remove-reject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove ,Reject
        run: sed -i 's/,Reject//g' Shadowrocket-ADBlock-Rules.list
      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add Shadowrocket-ADBlock-Rules.list
          git commit -m "Remove ,Reject from all rules"
          git push
