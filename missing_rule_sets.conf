# Недостающие списки правил (RULE-SET)
#
# Сравнение основной конфигурации sr_ru_extended.conf с конфигурациями:
# sr_ru_basic, sr_ru_geo, sr_ru_mini, sr_ru_public_lists, shadowrocket_sr_ru_basic_custom.
#
# Здесь собраны только те списки, которых НЕТ в sr_ru_extended.conf.
# Политики (куда направлять трафик) взяты из исходных конфигураций:
# PROXY заменён на группу ⚡️БЫСТРЫЕ ПРОКСИ из основной конфигурации.
# Строки можно копировать в секцию [Rule] основной конфигурации целиком или выборочно.

# --- Списки Misha Tugushev (shadowrocket-configuration-file) ---

# Discord: домены (в основной конфигурации есть только порты Game_Discord_Ports)
RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/release/rules/domains_discord.list,⚡️БЫСТРЫЕ ПРОКСИ

# Голосовые порты Discord/WhatsApp/Telegram (из sr_ru_mini)
RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/voice_ports.list,⚡️БЫСТРЫЕ ПРОКСИ

# IP-адреса заблокированных сервисов (из sr_ru_basic и basic_custom)
RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domain_ips.list,⚡️БЫСТРЫЕ ПРОКСИ,no-resolve

# Домены для определения геолокации (из basic_custom)
RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/domains_geo_detect.list,⚡️БЫСТРЫЕ ПРОКСИ

# Пользовательский прокси-список автора (из sr_ru_geo)
RULE-SET,https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/rules/custom-proxy.list,⚡️БЫСТРЫЕ ПРОКСИ

# Российские банки — напрямую (из basic_custom; в репозитории есть локальная копия proxy-finance-ru.list, но она не подключена)
RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/rules/domains_banking.list,DIRECT

